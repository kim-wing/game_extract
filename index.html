<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小侠游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0f172a;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .game-container {
      position: relative;
      width: 90vw;
      max-width: 900px;
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border-radius: 16px;
      border: 2px solid #334155;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    /* 移动端全屏适配 */
    @media (max-width: 768px) {
      body {
        min-height: 100vh;
        min-height: 100dvh; /* 动态视口高度，适配移动端浏览器 */
        padding: 0;
        justify-content: flex-start;
      }
      .game-container {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        max-width: none;
        border-radius: 0;
        border: none;
        aspect-ratio: auto;
      }
      #gameCanvas {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
    }
    /* 横屏移动端全屏适配 */
    @media (orientation: landscape) and (max-height: 600px) {
      body {
        min-height: 100vh;
        min-height: 100dvh;
        padding: 0;
        justify-content: flex-start;
      }
      .game-container {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        max-width: none;
        border-radius: 0;
        border: none;
        aspect-ratio: auto;
      }
      #gameCanvas {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
    }
    #gameCanvas {
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
    }
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #64748b;
      font-size: 1.1rem;
    }
    .controls {
      margin-top: 24px;
      text-align: center;
      color: #94a3b8;
    }
    .controls h2 {
      color: #f1f5f9;
      font-size: 1.2rem;
      margin-bottom: 12px;
    }
    .key-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px 16px;
      font-size: 0.875rem;
    }
    .key {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #1e293b;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid #334155;
    }
    .key-badge {
      background: #475569;
      color: #f1f5f9;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .mobile-controls {
      display: none;
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      z-index: 5;
      pointer-events: auto;
    }
    /* 竖屏手机 */
    @media (max-width: 768px) {
      .mobile-controls {
        display: flex;
        flex-direction: column;
        left: max(14px, env(safe-area-inset-left));
        right: max(14px, env(safe-area-inset-right));
        bottom: max(14px, env(safe-area-inset-bottom));
      }
      .mobile-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 12px;
      }
      .mobile-stick {
        display: flex;
        align-items: flex-end;
        justify-content: flex-start;
        min-width: clamp(118px, 34vw, 160px);
      }
      .mobile-btn {
        width: clamp(52px, 15vw, 64px);
        height: clamp(52px, 15vw, 64px);
        border-radius: 50%;
        background: rgba(30, 41, 59, 0.8);
        border: 2px solid #475569;
        color: #f1f5f9;
        font-size: clamp(18px, 6vw, 24px);
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        touch-action: manipulation;
        pointer-events: auto;
      }
      .mobile-btn:active {
        background: rgba(71, 85, 105, 0.8);
        transform: scale(0.95);
      }
      .mobile-joystick {
        width: clamp(118px, 30vw, 160px);
        height: clamp(118px, 30vw, 160px);
        border-radius: 50%;
        background: rgba(15, 23, 42, 0.45);
        border: 2px solid rgba(148, 163, 184, 0.55);
        position: relative;
        overflow: hidden;
        touch-action: none;
        pointer-events: auto;
      }
      .mobile-joystick::before {
        content: '';
        position: absolute;
        inset: 18%;
        border-radius: 50%;
        border: 1px solid rgba(148, 163, 184, 0.22);
      }
      .mobile-joystick-knob {
        width: 42%;
        height: 42%;
        border-radius: 50%;
        position: absolute;
        left: 29%;
        top: 29%;
        background: radial-gradient(circle at 30% 30%, #cbd5e1 0%, #64748b 55%, #334155 100%);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        transform: translate(0, 0);
        transition: transform 70ms linear;
        pointer-events: none;
      }
      .mobile-actions {
        display: flex;
        gap: 12px;
        align-items: flex-end;
      }
      .mobile-btn--attack {
        background: rgba(220, 38, 38, 0.3) !important;
        border-color: #dc2626 !important;
      }
      .mobile-btn--dance {
        background: rgba(250, 204, 21, 0.25) !important;
        border-color: #facc15 !important;
      }
      .mobile-btn--restart {
        background: rgba(14, 165, 233, 0.28) !important;
        border-color: #38bdf8 !important;
        font-size: clamp(16px, 5vw, 20px);
      }
      /* 隐藏桌面端控制说明 */
      .controls {
        display: none;
      }
    }
    /* 横屏手机/平板 */
    @media (orientation: landscape) and (max-height: 600px) {
      .mobile-controls {
        display: flex;
        flex-direction: column;
        bottom: max(10px, env(safe-area-inset-bottom));
        left: max(10px, env(safe-area-inset-left));
        right: max(10px, env(safe-area-inset-right));
      }
      .mobile-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 10px;
      }
      .mobile-stick {
        display: flex;
        align-items: flex-end;
        justify-content: flex-start;
        min-width: 118px;
      }
      .mobile-btn {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: rgba(30, 41, 59, 0.8);
        border: 2px solid #475569;
        color: #f1f5f9;
        font-size: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        touch-action: manipulation;
      }
      .mobile-btn:active {
        background: rgba(71, 85, 105, 0.8);
        transform: scale(0.95);
      }
      .mobile-joystick {
        width: 118px;
        height: 118px;
        border-radius: 50%;
        background: rgba(15, 23, 42, 0.45);
        border: 2px solid rgba(148, 163, 184, 0.55);
        position: relative;
        overflow: hidden;
        touch-action: none;
        pointer-events: auto;
      }
      .mobile-joystick::before {
        content: '';
        position: absolute;
        inset: 18%;
        border-radius: 50%;
        border: 1px solid rgba(148, 163, 184, 0.22);
      }
      .mobile-joystick-knob {
        width: 42%;
        height: 42%;
        border-radius: 50%;
        position: absolute;
        left: 29%;
        top: 29%;
        background: radial-gradient(circle at 30% 30%, #cbd5e1 0%, #64748b 55%, #334155 100%);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        transform: translate(0, 0);
        transition: transform 70ms linear;
        pointer-events: none;
      }
      .mobile-actions {
        display: flex;
        gap: 10px;
        align-items: flex-end;
      }
      .mobile-btn--attack {
        background: rgba(220, 38, 38, 0.3) !important;
        border-color: #dc2626 !important;
      }
      .mobile-btn--dance {
        background: rgba(250, 204, 21, 0.25) !important;
        border-color: #facc15 !important;
      }
      .mobile-btn--restart {
        background: rgba(14, 165, 233, 0.28) !important;
        border-color: #38bdf8 !important;
        font-size: 18px;
      }
      /* 横屏时隐藏控制说明 */
      .controls {
        display: none;
      }
      /* 游戏容器适应横屏 */
      .game-container {
        width: 95vw;
        max-width: none;
        aspect-ratio: 16/9;
      }
      /* 横屏时按钮间距调整 */
      .mobile-controls {
        bottom: max(10px, env(safe-area-inset-bottom));
        left: max(10px, env(safe-area-inset-left));
        right: max(10px, env(safe-area-inset-right));
      }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="loading" class="loading">加载中...</div>
    
    <div class="mobile-controls">
      <div class="mobile-row">
        <div class="mobile-stick">
          <div class="mobile-joystick" id="joystick" aria-label="移动控制">
            <div class="mobile-joystick-knob" id="joystickKnob"></div>
          </div>
        </div>
        <div class="mobile-actions">
          <button class="mobile-btn mobile-btn--restart" id="btnRestart">↻</button>
          <button class="mobile-btn mobile-btn--dance" id="btnDance">♪</button>
          <button class="mobile-btn mobile-btn--attack" id="btnAttack">⚔</button>
        </div>
      </div>
    </div>
  </div>
  
  <div class="controls">
    <h2>操作</h2>
    <div class="key-list">
      <span class="key"><span class="key-badge">←→</span> 移动</span>
      <span class="key"><span class="key-badge">↑</span> 跳跃</span>
      <span class="key"><span class="key-badge">空格</span> 攻击</span>
      <span class="key"><span class="key-badge">⇧</span> 慢走</span>
      <span class="key"><span class="key-badge">F</span> 跳舞</span>
      <span class="key"><span class="key-badge">R</span> 重开</span>
    </div>
  </div>

  <script>
    // Game constants
    const CANVAS_WIDTH = 900;
    const CANVAS_HEIGHT = 506;
    const FRAME_WIDTH = 256;
    const FRAME_HEIGHT = 256;
    const SPRITE_SCALE = 0.5;
    const SPRITE_DRAW_WIDTH = FRAME_WIDTH * SPRITE_SCALE;
    const SPRITE_DRAW_HEIGHT = FRAME_HEIGHT * SPRITE_SCALE;
    const GROUND_Y = 510;
    const GRAVITY = 0.6;
    const JUMP_FORCE = -12;
    const SPEED_RUN = 3;
    const SPEED_WALK = 1.5;
    const FRAME_MS = 1000 / 60;
    const MAX_DELTA_MS = 50;
    const PLAYER_START_X = 0;
    const CAMERA_TARGET_X = CANVAS_WIDTH * 0.48;
    const METER_TO_WORLD = 8;
    const EASTER_DISTANCE_M = 500;
    const EASTER_RELIC_X = -EASTER_DISTANCE_M * METER_TO_WORLD;
    const EASTER_BOSS_X = EASTER_DISTANCE_M * METER_TO_WORLD;
    const PLATFORM_HEIGHT = 16;
    const PLAYER_PLATFORM_OFFSET = 18;
    
    // Animation configs
    const ANIMATIONS = {
      idle: {
        frames: 25,
        columns: 5,
        fps: 12,
        loop: true
      },
      run: {
        frames: 25,
        columns: 5,
        fps: 15,
        loop: true
      },
      attack: {
        frames: 25,
        columns: 5,
        fps: 18,
        loop: false
      },
      dance: {
        frames: 25,
        columns: 5,
        fps: 15,
        loop: false
      }
    };
    const DANCE_INVULN_MS = Math.round((ANIMATIONS.dance.frames / ANIMATIONS.dance.fps) * 1000);

    const camera = {
      x: PLAYER_START_X - CAMERA_TARGET_X
    };

    // Game state
    const state = {
      x: PLAYER_START_X,
      y: GROUND_Y,
      vx: 0,
      vy: 0,
      facing: 1, // 1 = right, -1 = left
      isGrounded: true,
      isAttacking: false,
      isDancing: false,
      isWalking: false,
      currentAnim: 'idle',
      frameIndex: 0,
      frameTimer: 0,
      attackTimer: 0,
      hasAttackHit: false,
      hurtTimer: 0,
      invulnTimer: 0,
      danceInvulnTimer: 0,
      hp: 5,
      maxHp: 5,
      level: 1,
      exp: 0,
      nextExp: 6,
      baseAttack: 1,
      levelAttackBonus: 0,
      levelSpeedBonus: 0,
      tempAttackBonus: 0,
      attackPower: 1,
      attackBoostTimer: 0,
      speedBoostTimer: 0,
      pendingLevelUps: 0,
      upgradeOptions: [],
      pickupText: '',
      pickupTextTimer: 0,
      levelFlashTimer: 0,
      fragilePlatforms: {},
      alertText: '',
      alertTimer: 0,
      alertColor: '#fef08a',
      standingPlatformId: null
    };

    const easterState = {
      relicSpawned: false,
      relicCollected: false,
      bossSpawned: false,
      bossKilled: false
    };

    const relicPlatforms = [
      { x: EASTER_RELIC_X + 260, y: GROUND_Y - 78, width: 120, type: 'start' },
      { x: EASTER_RELIC_X + 108, y: GROUND_Y - 136, width: 80, type: 'step' },
      { x: EASTER_RELIC_X - 34, y: GROUND_Y - 192, width: 72, type: 'step' },
      { x: EASTER_RELIC_X - 192, y: GROUND_Y - 148, width: 84, type: 'step' },
      { x: EASTER_RELIC_X - 338, y: GROUND_Y - 230, width: 68, type: 'step' },
      { x: EASTER_RELIC_X - 492, y: GROUND_Y - 286, width: 72, type: 'step' },
      { x: EASTER_RELIC_X - 652, y: GROUND_Y - 242, width: 94, type: 'step' },
      { x: EASTER_RELIC_X - 816, y: GROUND_Y - 332, width: 128, type: 'goal' }
    ];
    const relicGoalPlatform = relicPlatforms[relicPlatforms.length - 1];

    function getStagePlatforms(level, time) {
      const platforms = [];

      if (level >= 3) {
        platforms.push({
          id: 'moving-a',
          worldX: 220,
          y: GROUND_Y - 72,
          width: 118,
          type: 'moving'
        });
      }

      if (level >= 4) {
        platforms.push({
          id: 'moving-b',
          worldX: 438,
          y: GROUND_Y - 136,
          width: 96,
          type: 'moving'
        });
      }

      if (level >= 6) {
        platforms.push({
          id: 'fragile-a',
          worldX: 610,
          y: GROUND_Y - 138,
          width: 94,
          type: 'fragile'
        });
      }

      if (level >= 8) {
        platforms.push({
          id: 'fragile-b',
          worldX: 320,
          y: GROUND_Y - 252,
          width: 78,
          type: 'fragile'
        });
      }

      return platforms;
    }

    function worldToScreenX(x) {
      return x - camera.x;
    }

    function updateCamera() {
      const targetX = state.x - CAMERA_TARGET_X;
      camera.x += (targetX - camera.x) * 0.18;
    }

    const levelState = {
      level: 1,
      kills: 0,
      totalKills: 0,
      targetKills: 4,
      phase: 'playing',
      transitionTimer: 0,
      bannerTimer: 150,
      bannerText: '第 1 关',
      bossSpawned: false,
      seenTypes: {
        sprout: true
      }
    };

    function showAlert(text, color = '#fef08a', duration = 120) {
      state.alertText = text;
      state.alertColor = color;
      state.alertTimer = duration;
    }

    function isUpgradeMenuOpen() {
      return state.upgradeOptions.length > 0;
    }

    const UPGRADE_POOL = [
      {
        id: 'atk',
        title: '锋刃',
        desc: '攻击 +1',
        apply: () => {
          state.levelAttackBonus += 1;
        }
      },
      {
        id: 'hp',
        title: '铁骨',
        desc: '生命上限 +2，回复 2 点',
        apply: () => {
          state.maxHp += 2;
          state.hp = Math.min(state.maxHp, state.hp + 2);
        }
      },
      {
        id: 'speed',
        title: '疾步',
        desc: '移动速度小幅提升',
        apply: () => {
          state.levelSpeedBonus += 0.2;
        }
      },
      {
        id: 'heal',
        title: '回春',
        desc: '立即回复 3 点生命',
        apply: () => {
          state.hp = Math.min(state.maxHp, state.hp + 3);
        }
      },
      {
        id: 'jump',
        title: '飞跃',
        desc: '升级时额外回复，并提升跳跃手感',
        apply: () => {
          state.maxHp += 1;
          state.hp = Math.min(state.maxHp, state.hp + 1);
          state.pickupText = '跳跃强化';
          state.pickupTextTimer = 80;
        }
      }
    ];

    function rollUpgradeOptions() {
      const pool = [...UPGRADE_POOL];
      const options = [];
      while (pool.length > 0 && options.length < 3) {
        const index = Math.floor(Math.random() * pool.length);
        options.push(pool.splice(index, 1)[0]);
      }
      return options;
    }

    function openNextUpgradeMenu() {
      if (state.pendingLevelUps <= 0 || isUpgradeMenuOpen()) return;
      state.pendingLevelUps -= 1;
      state.upgradeOptions = rollUpgradeOptions();
      showAlert('升级三选一', '#93c5fd', 90);
    }

    function applyUpgradeChoice(index) {
      if (!isUpgradeMenuOpen()) return;
      const option = state.upgradeOptions[index];
      if (!option) return;
      option.apply();
      syncAttackPower();
      state.pickupText = `${option.title} 已获得`;
      state.pickupTextTimer = 100;
      state.levelFlashTimer = 70;
      createCollisionParticles(state.x, state.y - SPRITE_DRAW_HEIGHT * 0.55, '#93c5fd');
      state.upgradeOptions = [];
      if (state.pendingLevelUps > 0) {
        openNextUpgradeMenu();
      }
    }

    function syncAttackPower() {
      if (easterState.relicCollected) {
        state.attackPower = 999;
        return;
      }
      state.attackPower = state.baseAttack + state.levelAttackBonus + state.tempAttackBonus;
    }

    function grantExp(amount) {
      if (levelState.phase === 'gameover' || levelState.phase === 'won') return;
      state.exp += amount;

      while (state.exp >= state.nextExp) {
        state.exp -= state.nextExp;
        state.level++;
        state.nextExp = Math.round(state.nextExp * 1.4) + 2;
        state.pickupText = `升级 Lv.${state.level}`;
        state.pickupTextTimer = 110;
        state.levelFlashTimer = 60;
        state.pendingLevelUps += 1;
        showAlert('升级，选择一项强化', '#93c5fd', 90);
        createCollisionParticles(state.x, state.y - SPRITE_DRAW_HEIGHT * 0.55, '#93c5fd');
      }

      openNextUpgradeMenu();
    }

    function getLevelConfig(level) {
      return {
        targetKills: 3 + level,
        maxMonsters: Math.min(2 + Math.floor(level / 2), 5),
        spawnInterval: Math.max(48, MONSTER_SPAWN_INTERVAL - (level - 1) * 12),
        monsterHp: MONSTER_HP + Math.floor((level - 1) / 2) + Math.floor((state.level - 1) / 3),
        monsterSpeed: MONSTER_SPEED + Math.min(0.9, (level - 1) * 0.08) + Math.min(0.35, (state.level - 1) * 0.02),
        monsterDamage: 1 + Math.floor((level - 1) / 4) + Math.floor((state.level - 1) / 5)
      };
    }

    function startLevel(level) {
      const config = getLevelConfig(level);
      levelState.level = level;
      levelState.kills = 0;
      levelState.targetKills = isBossLevel(level) ? 1 : config.targetKills;
      levelState.phase = 'playing';
      levelState.bossSpawned = false;
      levelState.transitionTimer = 0;
      levelState.bannerTimer = 130;
      levelState.bannerText = `第 ${level} 关`;
      monsterSpawnTimer = Math.max(0, config.spawnInterval - 35);
    }

    function clearLevel() {
      levelState.phase = 'cleared';
      levelState.transitionTimer = 130;
      levelState.bannerTimer = 130;
      levelState.bannerText = '过关';
      state.hp = Math.min(state.maxHp, state.hp + 1);
      createCollisionParticles(state.x, state.y - SPRITE_DRAW_HEIGHT * 0.55, '#bef264');
    }

    function completeEasterEnding() {
      easterState.bossKilled = true;
      levelState.phase = 'won';
      levelState.bannerTimer = 999999;
      levelState.bannerText = '隐藏通关';
      state.isAttacking = false;
      state.isDancing = true;
      state.vx = 0;
      state.vy = 0;
      state.currentAnim = 'dance';
      state.frameIndex = 0;
      state.frameTimer = 0;
      state.danceInvulnTimer = Infinity;
      createCollisionParticles(EASTER_BOSS_X, GROUND_Y - MONSTER_HEIGHT, '#fde047');
      createCollisionParticles(state.x, state.y - SPRITE_DRAW_HEIGHT * 0.45, '#fef08a');
      monsters.length = 0;
    }

    function updateVictoryDance(deltaMs, step) {
      updateParticles(step);
      updateCamera();

      const anim = ANIMATIONS.dance;
      state.currentAnim = 'dance';
      state.isDancing = true;
      state.frameTimer += deltaMs;
      const frameDuration = 1000 / anim.fps;

      if (state.frameTimer >= frameDuration) {
        state.frameTimer -= frameDuration;
        state.frameIndex = (state.frameIndex + 1) % anim.frames;
      }
    }

    function restartGame() {
      monsters.length = 0;
      enemyProjectiles.length = 0;
      powerups.length = 0;
      particles.length = 0;
      state.x = PLAYER_START_X;
      state.y = GROUND_Y;
      state.vx = 0;
      state.vy = 0;
      state.level = 1;
      state.exp = 0;
      state.nextExp = 6;
      state.maxHp = 5;
      state.hp = state.maxHp;
      state.baseAttack = 1;
      state.levelAttackBonus = 0;
      state.levelSpeedBonus = 0;
      state.tempAttackBonus = 0;
      state.attackPower = 1;
      state.attackBoostTimer = 0;
      state.speedBoostTimer = 0;
      state.pickupText = '';
      state.pickupTextTimer = 0;
      state.levelFlashTimer = 0;
      state.fragilePlatforms = {};

    // Particle system for collision effects
    const particles = [];
    
    function createCollisionParticles(x, y, color = '#ff6b6b') {
      for (let i = 0; i < 8; i++) {
        const angle = (Math.PI * 2 * i) / 8;
        const speed = 2 + Math.random() * 3;
        particles.push({
          x: x,
          y: y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 30,
          maxLife: 30,
          color: color,
          size: 3 + Math.random() * 3
        });
      }
    }
    
    function updateParticles(step) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * step;
        p.y += p.vy * step;
        p.vy += 0.1 * step; // gravity
        p.life -= step;
        
        if (p.life <= 0) {
          particles.splice(i, 1);
        }
      }
    }
    
    function drawParticles() {
      particles.forEach(p => {
        const x = worldToScreenX(p.x);
        if (x < -40 || x > CANVAS_WIDTH + 40) return;
        const alpha = p.life / p.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(x, p.y, p.size * alpha, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }

    // Power-up system
    const powerups = [];
    const POWERUP_SIZE = 26;
    const POWERUP_TYPES = {
      power: {
        label: '攻击提升',
        color: '#facc15',
        accent: '#f97316',
        duration: 720
      },
      heal: {
        label: '回复',
        color: '#fb7185',
        accent: '#fff1f2',
        duration: 0
      },
      speed: {
        label: '加速',
        color: '#38bdf8',
        accent: '#e0f2fe',
        duration: 600
      },
      relic: {
        label: '获得无敌攻击力',
        color: '#fef08a',
        accent: '#facc15',
        duration: 0
      }
    };

    function spawnPowerup(x, y, forcedType = null, persistent = false, landingY = GROUND_Y - 32) {
      const roll = Math.random();
      const type = forcedType || (roll < 0.45 ? 'power' : roll < 0.72 ? 'heal' : 'speed');
      powerups.push({
        type,
        x,
        y: y - 40,
        landingY,
        vy: -2.6,
        life: persistent ? Infinity : 720,
        persistent,
        bob: Math.random() * Math.PI * 2
      });
    }

    function applyPowerup(powerup) {
      const config = POWERUP_TYPES[powerup.type];
      state.pickupText = config.label;
      state.pickupTextTimer = 95;

      if (powerup.type === 'relic') {
        easterState.relicCollected = true;
        state.tempAttackBonus = 0;
        state.attackBoostTimer = Infinity;
        syncAttackPower();
      } else if (powerup.type === 'power') {
        if (easterState.relicCollected) {
          state.pickupText = '无敌攻击力已生效';
          createCollisionParticles(powerup.x, powerup.y, config.color);
          return;
        }
        state.tempAttackBonus = 1;
        state.attackBoostTimer = config.duration;
        syncAttackPower();
      } else if (powerup.type === 'heal') {
        state.hp = Math.min(state.maxHp, state.hp + 2);
      } else if (powerup.type === 'speed') {
        state.speedBoostTimer = config.duration;
      }

      createCollisionParticles(powerup.x, powerup.y, config.color);
    }

    function updatePowerups(step) {
      for (let i = powerups.length - 1; i >= 0; i--) {
        const p = powerups[i];
        p.life -= step;
        p.bob += 0.08 * step;

        if (p.y < p.landingY) {
          p.vy += 0.16 * step;
          p.y += p.vy * step;
        } else {
          p.y = p.landingY;
          p.vy = 0;
        }

        const dx = p.x - state.x;
        const dy = p.y - (state.y - SPRITE_DRAW_HEIGHT * 0.55);
        if (dx * dx + dy * dy < 42 * 42) {
          applyPowerup(p);
          powerups.splice(i, 1);
          continue;
        }

        if (p.life <= 0) {
          powerups.splice(i, 1);
        }
      }
    }

    function drawPowerups() {
      powerups.forEach(p => {
        const config = POWERUP_TYPES[p.type];
        const y = p.y + Math.sin(p.bob) * 3;
        const x = worldToScreenX(p.x);

        if (x < -80 || x > CANVAS_WIDTH + 80) return;

        ctx.save();
        ctx.translate(Math.round(x - POWERUP_SIZE / 2), Math.round(y - POWERUP_SIZE / 2));
        ctx.fillStyle = 'rgba(15, 23, 42, 0.25)';
        ctx.fillRect(3, POWERUP_SIZE - 2, POWERUP_SIZE - 6, 4);
        ctx.fillStyle = config.color;
        ctx.fillRect(5, 4, 16, 16);
        ctx.fillStyle = config.accent;
        ctx.fillRect(8, 7, 10, 10);

        if (p.type === 'relic') {
          ctx.translate(-13, -12);
          ctx.fillStyle = 'rgba(15, 23, 42, 0.28)';
          ctx.fillRect(4, 43, 46, 5);
          ctx.fillStyle = '#7c2d12';
          ctx.fillRect(24, 12, 7, 34);
          ctx.fillStyle = '#92400e';
          ctx.fillRect(26, 10, 5, 32);
          ctx.fillStyle = '#f8fafc';
          ctx.fillRect(11, 2, 24, 11);
          ctx.fillRect(6, 9, 34, 13);
          ctx.fillRect(13, 22, 20, 7);
          ctx.fillStyle = '#cbd5e1';
          ctx.fillRect(9, 13, 27, 5);
          ctx.fillRect(18, 25, 14, 4);
          ctx.fillStyle = '#facc15';
          ctx.fillRect(20, 8, 8, 8);
          ctx.fillStyle = '#713f12';
          ctx.fillRect(24, 16, 6, 4);
        } else if (p.type === 'power') {
          ctx.fillStyle = '#78350f';
          ctx.fillRect(12, 4, 3, 16);
          ctx.fillRect(8, 10, 11, 3);
        } else if (p.type === 'heal') {
          ctx.fillStyle = '#be123c';
          ctx.fillRect(11, 7, 4, 10);
          ctx.fillRect(8, 10, 10, 4);
        } else {
          ctx.fillStyle = '#0369a1';
          ctx.fillRect(8, 8, 10, 3);
          ctx.fillRect(11, 11, 7, 3);
          ctx.fillRect(8, 14, 6, 3);
        }

        ctx.restore();
      });
    }

    function drawRelicPlatforms() {
      const leftBound = camera.x - 120;
      const rightBound = camera.x + CANVAS_WIDTH + 120;

      relicPlatforms.forEach(platform => {
        if (platform.x + platform.width < leftBound || platform.x > rightBound) return;

        const screenX = Math.round(worldToScreenX(platform.x));
        const screenY = Math.round(platform.y);

        ctx.save();
        ctx.fillStyle = platform.type === 'goal' ? '#7c3aed' : '#92400e';
        ctx.fillRect(screenX, screenY, platform.width, PLATFORM_HEIGHT);

        ctx.fillStyle = platform.type === 'goal' ? '#c4b5fd' : '#f59e0b';
        for (let x = 4; x < platform.width - 4; x += 18) {
          ctx.fillRect(screenX + x, screenY + 4, 12, 4);
        }

        ctx.fillStyle = platform.type === 'goal' ? '#5b21b6' : '#78350f';
        for (let x = 0; x < platform.width; x += 22) {
          ctx.fillRect(screenX + x, screenY + 10, 2, PLATFORM_HEIGHT - 10);
        }

        ctx.fillStyle = 'rgba(15, 23, 42, 0.25)';
        ctx.fillRect(screenX + 6, screenY + PLATFORM_HEIGHT, platform.width - 12, 5);

        if (platform.type === 'goal') {
          ctx.fillStyle = '#fef08a';
          ctx.fillRect(screenX + platform.width / 2 - 12, screenY - 10, 24, 4);
        }

        ctx.restore();
      });
    }

    function drawStagePlatforms() {
      const platforms = getStagePlatforms(levelState.level, performance.now ? performance.now() : Date.now());
      platforms.forEach(platform => {
        const x = Math.round(worldToScreenX(platform.worldX));
        const y = Math.round(platform.y);
        if (x + platform.width < -32 || x > CANVAS_WIDTH + 32) return;
        ctx.save();
        if (platform.type === 'moving') {
          ctx.fillStyle = '#0f766e';
          ctx.fillRect(x, y, platform.width, PLATFORM_HEIGHT);
          ctx.fillStyle = '#99f6e4';
          for (let i = 6; i < platform.width - 6; i += 18) {
            ctx.fillRect(x + i, y + 4, 10, 4);
          }
        } else {
          const fragileState = state.fragilePlatforms[platform.id] || 0;
          ctx.globalAlpha = fragileState > 0 ? Math.max(0.35, 1 - fragileState / 90) : 1;
          ctx.fillStyle = '#7c2d12';
          ctx.fillRect(x, y, platform.width, PLATFORM_HEIGHT);
          ctx.fillStyle = '#fdba74';
          for (let i = 6; i < platform.width - 6; i += 18) {
            ctx.fillRect(x + i, y + 4, 10, 4);
          }
        }
        ctx.restore();
      });
    }

    function getAllPlatforms(time) {
      const stagePlatforms = getStagePlatforms(levelState.level, time).filter(platform => {
        if (platform.type !== 'fragile') return true;
        return (state.fragilePlatforms[platform.id] || 0) < 90;

      return [
        ...relicPlatforms.map(platform => ({ ...platform, worldX: platform.x })),

    function chooseMonsterType(level) {
      const roll = Math.random();
      if (level >= 5 && roll < 0.18) return 'blocky';
      if (level >= 4 && roll < 0.34) return 'puff';
      if (level >= 3 && roll < 0.5) return 'mage';
      if (level >= 3 && roll < 0.68) return 'berry';
      if (level >= 2 && roll < 0.86) return 'dewdrop';
      return 'sprout';

      return level === 5 || level === 10;

      const type = level === 5 ? 'stageBossBrute' : 'stageBossMage';

      const hp = config.monsterHp + palette.hpBonus + 8;
      const speed = config.monsterSpeed * palette.speedMul;
      const damage = Math.max(2, Math.round(config.monsterDamage * palette.damageMul));

      monsters.push({

    function triggerStageBossPhaseTwo(monster) {
      if (!monster.isStageBoss || monster.phaseTriggered || monster.hp > monster.maxHp * 0.5) return;

      monster.phase = 2;
      monster.phaseTriggered = true;
      monster.attackCooldown = 10;
      createCollisionParticles(monster.x, monster.y - MONSTER_HEIGHT, monster.palette.accent);
      createCollisionParticles(monster.x, monster.y - MONSTER_HEIGHT * 0.55, '#fde68a');

      if (monster.type === 'stageBossBrute') {
        monster.speed = monster.baseSpeed * 1.28;
        monster.damage = monster.baseDamage + 2;
        monster.drawScale = 2.32;
        showAlert('岩角王狂暴化', '#fb923c', 130);
      } else if (monster.type === 'stageBossMage') {
        monster.speed = monster.baseSpeed * 1.12;
        monster.damage = monster.baseDamage + 1;
        monster.attackRange += 56;
        monster.drawScale = 2.28;
        showAlert('夜魇术师进入二阶段', '#c084fc', 130);

      const config = getLevelConfig(levelState.level);
      const type = chooseMonsterType(levelState.level);
      const typeConfig = MONSTER_TYPES[type];
      const side = Math.random() < 0.5 ? 'left' : 'right';
      const x = side === 'left' ? camera.x - MONSTER_WIDTH : camera.x + CANVAS_WIDTH + MONSTER_WIDTH;
      const hp = Math.max(1, config.monsterHp + typeConfig.hpBonus);
      const speed = config.monsterSpeed * typeConfig.speedMul;
      
      monsters.push({
        type,
        palette: typeConfig,
        x: x,
        y: GROUND_Y - MONSTER_FOOT_OFFSET,
        vx: side === 'left' ? speed : -speed,
        speed,
        facing: side === 'left' ? 1 : -1,
        hp,
        maxHp: hp,
        attackStyle: typeConfig.attackStyle || 'melee',
        attackRange: typeConfig.attackRange || MONSTER_ATTACK_RANGE,
        damage: Math.max(1, Math.round(config.monsterDamage * (typeConfig.damageMul || 1))),

        isDead: false,
        isAttacking: false,

    function onMonsterKilled(monster) {
      if (monster.countedKill) return;
      monster.countedKill = true;
      if (monster.isBoss) {
        completeEasterEnding();
        return;
      }
      grantExp(monster.expReward || 1);
      levelState.kills++;
      levelState.totalKills++;
      levelState.bannerTimer = Math.max(levelState.bannerTimer, 24);
      createCollisionParticles(monster.x, monster.y - MONSTER_HEIGHT * 0.45, '#bbf7d0');
      if (Math.random() < 0.55 || levelState.kills % 4 === 0) {
        spawnPowerup(monster.x, monster.y);
