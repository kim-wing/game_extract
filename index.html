    function hitPlayer(sourceX, damage = 1) {
      if (state.invulnTimer > 0 || state.danceInvulnTimer > 0) return;

      state.hp = Math.max(0, state.hp - damage);
      state.hurtTimer = 18;
      state.invulnTimer = 70;
      state.x += sourceX < state.x ? 18 : -18;
      createCollisionParticles(state.x, state.y - SPRITE_DRAW_HEIGHT * 0.45, '#facc15');

      if (state.hp <= 0) {
        levelState.phase = 'gameover';
        levelState.bannerTimer = 999999;
        levelState.bannerText = '游戏结束';
      }
    }

    function spawnEnemyProjectile(monster) {
      const projectileX = monster.x + monster.facing * 22;
      const projectileY = monster.y - 34;
      const dx = state.x - projectileX;
      const dy = (state.y - SPRITE_DRAW_HEIGHT * 0.55) - projectileY;
      const distance = Math.hypot(dx, dy) || 1;
      const speed = monster.palette.projectileSpeed || 4;

      enemyProjectiles.push({
        x: projectileX,
        y: projectileY,
        vx: (dx / distance) * speed,
        vy: (dy / distance) * speed,
        life: 120,
        radius: 10,
        color: monster.palette.accent,
        glow: monster.palette.mid,
        damage: monster.damage,
        bossProjectile: !!monster.isStageBoss
      });
    }

    function spawnBossVolley(monster) {
      const baseSpeed = (monster.baseProjectileSpeed || monster.palette.projectileSpeed || 5.4) + (monster.phase === 2 ? 0.75 : 0);
      const spreads = monster.phase === 2
        ? [-0.38, -0.18, 0, 0.18, 0.38]
        : [-0.22, 0, 0.22];
      spreads.forEach((spread) => {
        const projectileX = monster.x + monster.facing * 24;
        const projectileY = monster.y - 36;
        const dx = state.x - projectileX;
        const dy = (state.y - SPRITE_DRAW_HEIGHT * 0.55) - projectileY;
        const distance = Math.hypot(dx, dy) || 1;
        const nx = dx / distance;
        const ny = dy / distance;
        const vx = nx * baseSpeed - ny * spread * baseSpeed;
        const vy = ny * baseSpeed + nx * spread * baseSpeed;
        enemyProjectiles.push({
          x: projectileX,
          y: projectileY,
          vx,
          vy,
          life: 140,
          radius: 11,
          color: monster.palette.accent,
          glow: monster.palette.mid,
          damage: monster.damage,
          bossProjectile: true
        });
      });
    }

    function updateEnemyProjectiles(step) {
      for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
        const projectile = enemyProjectiles[i];
        projectile.x += projectile.vx * step;
        projectile.y += projectile.vy * step;
        projectile.life -= step;

        const dx = projectile.x - state.x;
        const dy = projectile.y - (state.y - SPRITE_DRAW_HEIGHT * 0.55);
        if (dx * dx + dy * dy < 30 * 30) {
          hitPlayer(projectile.x, projectile.damage);
          createCollisionParticles(projectile.x, projectile.y, projectile.color);
          enemyProjectiles.splice(i, 1);
          continue;
        }

        if (
          projectile.life <= 0 ||
          projectile.x < camera.x - 60 ||
          projectile.x > camera.x + CANVAS_WIDTH + 60 ||
          projectile.y < -40 ||
          projectile.y > CANVAS_HEIGHT + 40
        ) {
          enemyProjectiles.splice(i, 1);
        }
      }
    }

    function updateMonsters(step) {
      if (levelState.phase === 'gameover' || levelState.phase === 'won') return;

      // Spawn new monsters (max 2 at a time)
      const config = getLevelConfig(levelState.level);
      let aliveMonsters = 0;
      for (let i = 0; i < monsters.length; i++) {
        if (!monsters[i].isDead) aliveMonsters++;
      }

      if (levelState.phase === 'cleared') {
        levelState.transitionTimer -= step;
        if (levelState.transitionTimer <= 0) {
          startLevel(levelState.level + 1);
        }
      } else if (levelState.phase === 'playing' && levelState.kills >= levelState.targetKills && aliveMonsters === 0) {
        clearLevel();
      } else if (levelState.phase === 'playing' && isBossLevel(levelState.level)) {
        if (aliveMonsters === 0 && !levelState.bossSpawned) {
          spawnStageBoss(levelState.level);
        }
      } else if (levelState.phase === 'playing' && levelState.kills < levelState.targetKills && aliveMonsters < config.maxMonsters) {
        monsterSpawnTimer += step;
        if (monsterSpawnTimer >= config.spawnInterval) {
          spawnMonster();
          monsterSpawnTimer = 0;
        }
      } else {
        monsterSpawnTimer = 0;
      }

      // Update existing monsters
      for (let i = monsters.length - 1; i >= 0; i--) {
        const m = monsters[i];
        
        if (m.isDead) {
          monsters.splice(i, 1);
          continue;
        }

        if (m.isStageBoss) {
          triggerStageBossPhaseTwo(m);
        }

        const playerDx = state.x - m.x;
        const playerDy = state.y - m.y;
        const absPlayerDx = Math.abs(playerDx);
        m.facing = playerDx >= 0 ? 1 : -1;
        m.animTimer += step;
        if (m.animTimer >= 8) {
          m.animTimer -= 8;
          m.animFrame = (m.animFrame + 1) % 4;
        }

        if (m.attackCooldown > 0) {
          m.attackCooldown -= step;
        }

        const canAttackPlayer = absPlayerDx <= (m.attackRange || MONSTER_ATTACK_RANGE) && Math.abs(playerDy) < 110;
        if (m.attackStyle === 'ranged') {
          if (m.stunTimer <= 0 && !m.isAttacking && m.attackCooldown <= 0 && canAttackPlayer) {
            m.isAttacking = true;
            m.state = 'cast';
            m.attackTimer = 0;
            m.hasAttackHit = false;
            m.vx = 0;
          }
        } else if (m.stunTimer <= 0 && !m.isAttacking && m.attackCooldown <= 0 && canAttackPlayer) {
          m.isAttacking = true;
          m.state = 'attack';
          m.attackTimer = 0;
          m.hasAttackHit = false;
          m.vx = 0;
        }

        if (m.isAttacking) {
          m.attackTimer += step;
          const attackHitFrame = m.attackStyle === 'slam'
            ? MONSTER_ATTACK_HIT_FRAME + (m.phase === 2 ? 1 : 5)
            : m.attackStyle === 'ranged'
              ? MONSTER_ATTACK_HIT_FRAME - (m.phase === 2 ? 7 : 4)
              : MONSTER_ATTACK_HIT_FRAME;
          const attackDuration = m.attackStyle === 'slam'
            ? MONSTER_ATTACK_DURATION + (m.phase === 2 ? 2 : 10)
            : m.attackStyle === 'ranged'
              ? MONSTER_ATTACK_DURATION - (m.phase === 2 ? 10 : 6)
              : MONSTER_ATTACK_DURATION;

          if (!m.hasAttackHit && m.attackTimer >= attackHitFrame) {
            if (m.attackStyle === 'ranged') {
              if (m.isStageBoss) {
                spawnBossVolley(m);
              } else {
                spawnEnemyProjectile(m);
              }
            } else {
              const hitDx = Math.abs(state.x - (m.x + m.facing * 18));
              const hitDy = Math.abs(state.y - m.y);
              const slamRange = m.isStageBoss && m.type === 'stageBossBrute' && m.phase === 2
                ? (m.attackRange || MONSTER_ATTACK_RANGE) + 24
                : (m.attackRange || MONSTER_ATTACK_RANGE);
              const slamHeight = m.isStageBoss && m.type === 'stageBossBrute' && m.phase === 2 ? 88 : 76;
              if (hitDx <= slamRange && hitDy < slamHeight) {
                hitPlayer(m.x, m.isBoss ? state.maxHp / 2 : m.damage);
                if (m.isStageBoss && m.type === 'stageBossBrute') {
                  state.x += m.facing * (m.phase === 2 ? 68 : 46);
                  createCollisionParticles(state.x, state.y, '#fb923c');
                  if (m.phase === 2) {
                    createCollisionParticles(state.x + m.facing * 16, state.y - 18, '#fde68a');
                  }
                }
              }
            }
            m.hasAttackHit = true;
          }

          if (m.attackTimer >= attackDuration) {
            m.isAttacking = false;
            m.state = 'walk';
            if (m.isStageBoss && m.phase === 2) {
              m.attackCooldown = m.attackStyle === 'ranged' ? 24 : 34;
            } else if (m.isStageBoss) {
              m.attackCooldown = m.attackStyle === 'ranged' ? 42 : 48;
            } else {
              m.attackCooldown = MONSTER_ATTACK_COOLDOWN;
            }
          }
        }

        const keepDistance = m.attackStyle === 'ranged' && absPlayerDx < 170;
        const chargeBoost = m.attackStyle === 'charge' && absPlayerDx > 90 ? 1.35 : 1;
        const intendedVx = m.isBoss || m.stunTimer > 0 || m.isAttacking
          ? 0
          : keepDistance
            ? -m.facing * m.speed * 0.75
            : m.facing * m.speed * chargeBoost;
        const nextX = m.x + intendedVx * step;
        const dx = nextX - state.x;
        const dy = m.y - state.y;
        
        // Check collision with player (tighter collision distance)
        const minDistance = MONSTER_WIDTH * 0.62; // Tighter collision
        const distanceSq = dx * dx + dy * dy;
        const isColliding = !m.isAttacking && distanceSq <= minDistance * minDistance;
        
        if (isColliding) {
          // PHYSICS: Bounce back - push monster and player apart
          const bounceForce = 3;
          const distance = Math.sqrt(distanceSq) || 1;
          const pushX = (m.x - state.x) / distance;
          
          // Push monster back
          m.x += pushX * bounceForce * 2 * step;
          
          // Visual flash effect on collision
          m.flashTimer = 10;
          
          if (m.collisionFxTimer <= 0) {
            // Create particle effect at collision point
            createCollisionParticles(
              state.x + (m.x - state.x) * 0.5,
              state.y,
              '#bef264'
            );
            m.collisionFxTimer = 10;
          }
        } else {
          // Normal movement when not colliding AND not stunned
          if (m.stunTimer <= 0 && !m.isAttacking) {
            m.x = nextX;
          }
        }

        // Flash effect when hit
        if (m.flashTimer > 0) {
          m.flashTimer -= step;
        }

        // Stun timer - monster can't move when stunned
        if (m.stunTimer > 0) {
          m.stunTimer -= step;
        }

        if (m.collisionFxTimer > 0) {
          m.collisionFxTimer -= step;
        }

        // Remove if off screen
        if (!m.isBoss && (m.x < camera.x - MONSTER_WIDTH * 2 || m.x > camera.x + CANVAS_WIDTH + MONSTER_WIDTH * 2)) {
          monsters.splice(i, 1);
        }
      }
    }

    function pixelRect(x, y, w, h, color, scale = 1) {
      ctx.fillStyle = color;
      ctx.fillRect(Math.round(x * scale), Math.round(y * scale), Math.round(w * scale), Math.round(h * scale));
    }

    function drawMonsterSprite(m) {
      const attacking = m.isAttacking;
      const attackT = attacking ? Math.min(1, m.attackTimer / MONSTER_ATTACK_DURATION) : 0;
      const walkPose = m.animFrame % 4;
      const bob = attacking ? 0 : (walkPose === 1 || walkPose === 3 ? -2 : 0);
      const squash = attacking ? 1 - Math.sin(attackT * Math.PI) * 0.08 : 1;
      const stretch = attacking ? 1 + Math.sin(attackT * Math.PI) * 0.08 : 1;
      const lunge = attacking ? Math.sin(attackT * Math.PI) * 6 : 0;
      const flash = m.flashTimer > 0 && Math.floor(m.flashTimer / 3) % 2 === 0;
      const palette = m.palette || MONSTER_TYPES.sprout;
      const body = flash ? '#fef9c3' : palette.color;
      const bodyDark = flash ? '#65a30d' : palette.dark;
      const bodyMid = flash ? '#ecfccb' : palette.mid;
      const cheek = palette.cheek;
      const leaf = palette.accent;
      const paw = attacking ? '#fef3c7' : '#dcfce7';
      const eye = attacking ? '#fff7ed' : '#f8fafc';
      const pupil = '#111827';
      const drawScale = m.drawScale || MONSTER_DRAW_SCALE;
      const screenX = worldToScreenX(m.x);

      ctx.save();
      ctx.translate(Math.round(screenX + m.facing * lunge), Math.round(m.y + bob));
      ctx.scale(m.facing * drawScale * stretch, drawScale * squash);
      ctx.translate(-24, -58);

      if (m.isStageBoss && m.phase === 2) {
        ctx.globalAlpha = 0.24;
        pixelRect(3, 8, 42, 46, m.type === 'stageBossBrute' ? '#fde68a' : '#ddd6fe');
        ctx.globalAlpha = 1;
      }

      ctx.fillStyle = 'rgba(15, 23, 42, 0.35)';
      ctx.fillRect(8, 55, 34, 5);

      // Type marker
      if (m.type === 'boss') {
        pixelRect(9, 2, 8, 10, '#facc15');
        pixelRect(31, 2, 8, 10, '#facc15');
        pixelRect(16, 0, 16, 7, bodyDark);
        pixelRect(20, -3, 8, 5, '#fde047');
      } else if (m.type === 'mage') {
        pixelRect(14, 1, 22, 6, bodyDark);
        pixelRect(10, 7, 30, 5, palette.accent);
        pixelRect(18, -3, 14, 6, bodyDark);
      } else if (m.type === 'berry') {
        pixelRect(14, 4, 22, 8, bodyDark);
        pixelRect(17, 1, 5, 6, '#16a34a');
        pixelRect(24, 1, 8, 5, '#4ade80');
      } else if (m.type === 'dewdrop') {
        pixelRect(20, 1, 8, 6, '#e0f2fe');
        pixelRect(17, 7, 14, 5, bodyDark);
      } else {
        pixelRect(21, 1, 4, 8, bodyDark);
        pixelRect(15, 5, 9, 5, leaf);
        pixelRect(24, 4, 9, 5, '#4ade80');
      }

      if (m.type === 'blocky') {
        pixelRect(9, 13, 30, 6, bodyDark);
        pixelRect(7, 19, 34, 24, bodyDark);
        pixelRect(11, 17, 26, 22, body);
        pixelRect(13, 19, 22, 8, bodyMid);
        pixelRect(12, 41, 10, 8, bodyDark);
        pixelRect(26, 41, 10, 8, bodyDark);
      } else if (m.type === 'puff') {
        pixelRect(16, 10, 16, 4, bodyDark);
        pixelRect(10, 14, 28, 5, bodyDark);
        pixelRect(6, 19, 36, 10, bodyDark);
        pixelRect(8, 29, 32, 13, bodyDark);
        pixelRect(12, 14, 24, 4, bodyMid);
        pixelRect(8, 18, 32, 18, body);
        pixelRect(12, 36, 24, 6, bodyMid);
      } else {
        // Soft blob outline and body
        pixelRect(14, 10, 20, 4, bodyDark);
        pixelRect(9, 14, 30, 5, bodyDark);
        pixelRect(6, 19, 36, 10, bodyDark);
        pixelRect(5, 29, 38, 15, bodyDark);
        pixelRect(8, 44, 32, 9, bodyDark);

        pixelRect(14, 13, 20, 4, bodyMid);
        pixelRect(10, 17, 28, 7, body);
        pixelRect(8, 24, 32, 16, body);
        pixelRect(10, 39, 28, 8, bodyMid);
        pixelRect(15, 47, 18, 5, body);
        pixelRect(16, 18, 10, 4, '#dcfce7');
      }

      const stepOffset = attacking ? 0 : (walkPose < 2 ? 2 : -1);
      pixelRect(10 + stepOffset, 52, 10, 4, bodyDark);
      pixelRect(28 - stepOffset, 52, 10, 4, bodyDark);

      // Face
      pixelRect(13, 27, 8, 8, eye);
      pixelRect(27, 27, 8, 8, eye);
      pixelRect(16, 30, 3, 3, pupil);
      pixelRect(30, 30, 3, 3, pupil);
      pixelRect(11, 36, 5, 3, cheek);
      pixelRect(33, 36, 5, 3, cheek);
      pixelRect(22, 37, 5, 2, bodyDark);
      pixelRect(24, 39, 3, 2, bodyDark);

      if (m.type === 'mage') {
        pixelRect(6, 31, 6, 10, bodyDark);
        pixelRect(38, 31, 6, 10, bodyDark);
        pixelRect(3, 33, 4, 8, '#ede9fe');
        pixelRect(43, 33, 4, 8, '#ede9fe');
        if (attacking) {
          pixelRect(42, 24, 5, 16, '#e9d5ff');
          pixelRect(46, 20, 4, 4, '#fef08a');
          ctx.globalAlpha = 0.8;
          pixelRect(48, 16, 4, 4, '#c4b5fd');
          pixelRect(50, 22, 3, 3, '#ddd6fe');
          ctx.globalAlpha = 1;
        }
      } else if (attacking) {
        const windup = attackT < 0.42;
        const armX = windup ? 35 : 39;
        const armY = windup ? 33 : 29;
        pixelRect(armX, armY, 8, 6, bodyDark);
        pixelRect(armX + 6, armY - 1, 9, 7, paw);
        pixelRect(armX + 14, armY + 1, 3, 3, '#fde68a');

        if (!windup && attackT < 0.72) {
          ctx.globalAlpha = 0.72;
          pixelRect(44, 25, 4, 2, '#fef08a');
          pixelRect(48, 30, 4, 2, '#fef08a');
          pixelRect(45, 37, 4, 2, '#fef08a');
          ctx.globalAlpha = 1;
        }
      } else {
        pixelRect(3, 34, 7, 6, bodyDark);
        pixelRect(38, 34, 7, 6, bodyDark);
        pixelRect(1, 36, 4, 4, paw);
        pixelRect(43, 36, 4, 4, paw);
      }

      ctx.restore();
    }

    function drawMonsters() {
      monsters.forEach(m => {
        drawMonsterSprite(m);

        // HP bar
        const hpPercent = m.hp / m.maxHp;
        ctx.fillStyle = '#1f2937';
        const screenX = worldToScreenX(m.x);
        const barWidth = m.isBoss ? 86 : m.isStageBoss ? 110 : 50;
        const barY = m.y - (m.isBoss ? 150 : m.isStageBoss ? 132 : MONSTER_HEIGHT + 8);
        ctx.fillRect(screenX - barWidth / 2, barY, barWidth, 5);
        ctx.fillStyle = m.isBoss && !easterState.relicCollected
          ? '#a855f7'
          : m.isStageBoss
            ? (m.phase === 2 ? '#fde047' : '#f97316')
            : (hpPercent > 0.5 ? '#22c55e' : '#ef4444');
        ctx.fillRect(screenX - barWidth / 2, barY, barWidth * hpPercent, 5);

        if (m.isStageBoss) {
          ctx.fillStyle = m.phase === 2 ? '#fef08a' : '#fed7aa';
          ctx.font = '700 10px ui-monospace, SFMono-Regular, Menlo, monospace';
          ctx.textAlign = 'center';
          ctx.fillText(`${m.palette.name} ${m.phase === 2 ? '二阶段' : '一阶段'}`, screenX, barY - 12);
        }
      });
    }

    function drawEnemyProjectiles() {
      enemyProjectiles.forEach(projectile => {
        const x = worldToScreenX(projectile.x);
        if (x < -30 || x > CANVAS_WIDTH + 30) return;

        ctx.save();
        ctx.globalAlpha = 0.9;
        ctx.fillStyle = projectile.glow;
        ctx.beginPath();
        ctx.arc(x, projectile.y, projectile.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = projectile.color;
        ctx.beginPath();
        ctx.arc(x, projectile.y, projectile.radius * 0.58, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });
    }

    function drawLevelHud() {
      const progress = Math.min(1, levelState.kills / levelState.targetKills);

      ctx.save();
      ctx.font = '700 14px ui-monospace, SFMono-Regular, Menlo, monospace';
      ctx.textBaseline = 'top';

      ctx.fillStyle = 'rgba(15, 23, 42, 0.62)';
      ctx.fillRect(CANVAS_WIDTH - 180, 18, 158, 52);
      ctx.strokeStyle = 'rgba(190, 242, 100, 0.65)';
      ctx.lineWidth = 2;
      ctx.strokeRect(CANVAS_WIDTH - 180, 18, 158, 52);

      ctx.fillStyle = '#f8fafc';
      ctx.fillText(`关卡 ${levelState.level}`, CANVAS_WIDTH - 168, 27);
      ctx.fillStyle = '#cbd5e1';
      ctx.fillText(`击败 ${levelState.totalKills}`, CANVAS_WIDTH - 82, 27);

      ctx.fillStyle = '#334155';
      ctx.fillRect(CANVAS_WIDTH - 168, 51, 134, 7);
      ctx.fillStyle = '#bef264';
      ctx.fillRect(CANVAS_WIDTH - 168, 51, 134 * progress, 7);
      ctx.fillStyle = '#e2e8f0';
      ctx.font = '700 11px ui-monospace, SFMono-Regular, Menlo, monospace';
      ctx.fillText(`${levelState.kills}/${levelState.targetKills}`, CANVAS_WIDTH - 72, 58);

      if (levelState.bannerTimer > 0) {
        const alpha = Math.min(1, levelState.bannerTimer / 28);
        const title = levelState.bannerText;
        const subtitle = levelState.phase === 'cleared'
          ? '生命 +1  下一波'
          : levelState.phase === 'gameover'
            ? '按 R 重开'
            : levelState.phase === 'won'
              ? '你发现了隐藏结局'
              : `目标 ${levelState.targetKills} 只怪物 + 掉落`;

        ctx.globalAlpha = alpha;
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(15, 23, 42, 0.72)';
        ctx.fillRect(CANVAS_WIDTH / 2 - 112, 92, 224, 62);
        ctx.strokeStyle = '#bef264';
        ctx.strokeRect(CANVAS_WIDTH / 2 - 112, 92, 224, 62);
        ctx.fillStyle = '#f8fafc';
        ctx.font = '800 24px ui-monospace, SFMono-Regular, Menlo, monospace';
        ctx.fillText(title, CANVAS_WIDTH / 2, 104);
        ctx.fillStyle = '#d9f99d';
        ctx.font = '700 11px ui-monospace, SFMono-Regular, Menlo, monospace';
        ctx.fillText(subtitle, CANVAS_WIDTH / 2, 135);
      }

      ctx.restore();
    }

    function getUpgradeCardRects() {
      const isCompact = CANVAS_WIDTH < 720;
      if (isCompact) {
        const cardWidth = Math.min(260, CANVAS_WIDTH - 44);
        const cardHeight = 88;
        const gap = 10;
        const totalHeight = cardHeight * 3 + gap * 2;
        const startY = CANVAS_HEIGHT / 2 - totalHeight / 2 + 8;
        return [0, 1, 2].map(index => ({
          x: CANVAS_WIDTH / 2 - cardWidth / 2,
          y: startY + index * (cardHeight + gap),
          width: cardWidth,
          height: cardHeight,
          compact: true
        }));
      }

      const cardWidth = Math.min(220, (CANVAS_WIDTH - 96) / 3);
      const gap = 16;
      const totalWidth = cardWidth * 3 + gap * 2;
      const startX = CANVAS_WIDTH / 2 - totalWidth / 2;
      const y = CANVAS_HEIGHT / 2 - 64;
      return [0, 1, 2].map(index => ({
        x: startX + index * (cardWidth + gap),
        y,
        width: cardWidth,
        height: 136,
        compact: false
      }));
    }

    function drawUpgradeMenu() {
      if (!isUpgradeMenuOpen()) return;

      const rects = getUpgradeCardRects();
      ctx.save();
      ctx.fillStyle = 'rgba(2, 6, 23, 0.72)';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      ctx.textAlign = 'center';
      ctx.fillStyle = '#f8fafc';
      ctx.font = '800 24px ui-monospace, SFMono-Regular, Menlo, monospace';
      ctx.fillText('升级三选一', CANVAS_WIDTH / 2, 104);
      ctx.fillStyle = '#cbd5e1';
      ctx.font = '700 12px ui-monospace, SFMono-Regular, Menlo, monospace';
      ctx.fillText('按 1 / 2 / 3 选择', CANVAS_WIDTH / 2, 126);

      state.upgradeOptions.forEach((option, index) => {
        const rect = rects[index];
        ctx.fillStyle = 'rgba(15, 23, 42, 0.92)';
        ctx.fillRect(rect.x, rect.y, rect.width, rect.height);
        ctx.strokeStyle = '#60a5fa';
        ctx.lineWidth = 2;
        ctx.strokeRect(rect.x, rect.y, rect.width, rect.height);
        ctx.fillStyle = '#93c5fd';
        ctx.fillRect(rect.x + 10, rect.y + 10, 24, 24);
        ctx.fillStyle = '#f8fafc';
        ctx.font = '800 18px ui-monospace, SFMono-Regular, Menlo, monospace';
        ctx.fillText(`${index + 1}`, rect.x + 22, rect.y + 14);
        ctx.textAlign = 'left';
        ctx.fillStyle = '#f8fafc';
        ctx.font = rect.compact
          ? '800 16px ui-monospace, SFMono-Regular, Menlo, monospace'
          : '800 18px ui-monospace, SFMono-Regular, Menlo, monospace';
        ctx.fillText(option.title, rect.x + 18, rect.y + (rect.compact ? 34 : 48));
        ctx.fillStyle = '#dbeafe';
        ctx.font = rect.compact
          ? '700 12px ui-monospace, SFMono-Regular, Menlo, monospace'
          : '700 13px ui-monospace, SFMono-Regular, Menlo, monospace';
        const descY = rect.compact ? rect.y + 56 : rect.y + 80;
        const descWidth = rect.width - 34;
        const words = option.desc.split('');
        let line = '';
        let row = 0;
        for (let i = 0; i < words.length; i++) {
          const test = line + words[i];
          if (ctx.measureText(test).width > descWidth && line) {
            ctx.fillText(line, rect.x + 18, descY + row * 16);
            line = words[i];
            row++;
            if (row > (rect.compact ? 1 : 2)) break;
          } else {
            line = test;
          }
        }
        if (line && row <= (rect.compact ? 1 : 2)) {
          ctx.fillText(line, rect.x + 18, descY + row * 16);
        }
        ctx.textAlign = 'center';
      });

      ctx.restore();
    }

    function checkAttackHit() {
      // Check if attack hits any monster
      const attackRange = FRAME_WIDTH * 0.5 * 0.6; // 60% of half sprite width
      const attackX = state.x + (state.facing * attackRange * 0.5);
      
      monsters.forEach(m => {
        if (m.isDead) return;
        
        const dx = m.x - attackX;
        const dy = m.y - state.y;
        const hitDistance = attackRange + MONSTER_WIDTH / 2;
        
        if (dx * dx + dy * dy < hitDistance * hitDistance) {
          if (m.isBoss && !easterState.relicCollected) {
            m.flashTimer = 18;
            m.stunTimer = 18;
            state.pickupText = '黄皮小儿没有神兵也敢来送命！';
            state.pickupTextTimer = 65;
            createCollisionParticles(m.x, m.y - MONSTER_HEIGHT, '#a855f7');
            return;
          }

          m.hp -= state.attackPower;
          m.flashTimer = 15; // Flash for 15 frames
          m.stunTimer = 60; // Stun for 60 frames (1 second at 60fps)
          
          if (m.hp <= 0) {
            m.isDead = true;
            onMonsterKilled(m);
          }
        }
      });
    }

    // Input state
    const keys = {};

    // Canvas setup
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    
    // Set canvas size
    canvas.width = CANVAS_WIDTH;
    canvas.height = CANVAS_HEIGHT;

    // Load images
    const images = {};
    const spriteFrames = {};
    let imagesLoaded = 0;
    const totalImages = 4;

    function buildSpriteFrameCache() {
      Object.keys(ANIMATIONS).forEach((name) => {
        const img = images[name];
        const anim = ANIMATIONS[name];
        spriteFrames[name] = [];

        for (let frame = 0; frame < anim.frames; frame++) {
          const frameCanvas = document.createElement('canvas');
          frameCanvas.width = SPRITE_DRAW_WIDTH;
          frameCanvas.height = SPRITE_DRAW_HEIGHT;

          const frameCtx = frameCanvas.getContext('2d');
          frameCtx.imageSmoothingEnabled = false;

          const col = frame % anim.columns;
          const row = Math.floor(frame / anim.columns);
          frameCtx.drawImage(
            img,
            col * FRAME_WIDTH,
            row * FRAME_HEIGHT,
            FRAME_WIDTH,
            FRAME_HEIGHT,
            0,
            0,
            SPRITE_DRAW_WIDTH,
            SPRITE_DRAW_HEIGHT
          );

          spriteFrames[name].push(frameCanvas);
        }
      });
    }

    function loadImage(name, src) {
      images[name] = new Image();
      images[name].onload = () => {
        imagesLoaded++;
        if (imagesLoaded === totalImages) {
          buildSpriteFrameCache();
          document.getElementById('loading').style.display = 'none';
          requestAnimationFrame(gameLoop);
        }
      };
      images[name].src = src;
    }

    // Load sprite images
    loadImage('idle', 'idle.png');
    loadImage('run', 'run.png');
    loadImage('attack', 'attack.png');
    loadImage('dance', 'dance.png');

    // Input handling
    window.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      if (e.code === 'KeyR' && (levelState.phase === 'gameover' || levelState.phase === 'won')) {
        restartGame();
      }
      if (e.code === 'Digit1') applyUpgradeChoice(0);
      if (e.code === 'Digit2') applyUpgradeChoice(1);
      if (e.code === 'Digit3') applyUpgradeChoice(2);
      
      // Prevent scrolling with arrow keys and space
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
        e.preventDefault();
      }
    });

    window.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });

    // Mobile controls
    const joystick = document.getElementById('joystick');
    const joystickKnob = document.getElementById('joystickKnob');
    const btnAttack = document.getElementById('btnAttack');
    const btnRestart = document.getElementById('btnRestart');
    const btnDance = document.getElementById('btnDance');
    const virtualMove = {
      active: false,
      dx: 0,
      dy: 0
    };

    function bindHoldButton(button, key) {
      if (!button) return;

      const press = (e) => {
        e.preventDefault();
        keys[key] = true;
      };
      const release = (e) => {
        if (e) e.preventDefault();
        keys[key] = false;
      };

      button.addEventListener('pointerdown', press);
      button.addEventListener('pointerup', release);
      button.addEventListener('pointercancel', release);
      button.addEventListener('pointerleave', release);
      button.addEventListener('touchstart', press, { passive: false });
      button.addEventListener('touchend', release, { passive: false });
      button.addEventListener('touchcancel', release, { passive: false });
      button.addEventListener('mousedown', press);
      button.addEventListener('mouseup', release);
      button.addEventListener('mouseleave', release);
    }

    bindHoldButton(btnAttack, 'Space');
    bindHoldButton(btnDance, 'KeyF');

    function setJoystickKnob(dx, dy) {
      if (!joystickKnob) return;
      joystickKnob.style.transform = `translate(${Math.round(dx)}px, ${Math.round(dy)}px)`;
    }

    function resetJoystick() {
      virtualMove.active = false;
      virtualMove.dx = 0;
      virtualMove.dy = 0;
      setJoystickKnob(0, 0);
    }

    function updateJoystickFromPointer(clientX, clientY) {
      if (!joystick) return;
      const rect = joystick.getBoundingClientRect();
      const radius = rect.width / 2;
      const knobRadius = joystickKnob ? joystickKnob.getBoundingClientRect().width / 2 : radius * 0.42;
      const maxDistance = Math.max(12, radius - knobRadius - 8);
      const centerX = rect.left + radius;
      const centerY = rect.top + radius;

      let dx = clientX - centerX;
      let dy = clientY - centerY;
      const distance = Math.hypot(dx, dy);
      if (distance > maxDistance) {
        dx = (dx / distance) * maxDistance;
        dy = (dy / distance) * maxDistance;
      }

      virtualMove.active = true;
      virtualMove.dx = dx / maxDistance;
      virtualMove.dy = dy / maxDistance;
      setJoystickKnob(dx, dy);
    }

    if (joystick) {
      let activePointerId = null;

      const onPointerDown = (e) => {
        if (e.button != null && e.button !== 0) return;
        e.preventDefault();
        activePointerId = e.pointerId;
        joystick.setPointerCapture?.(e.pointerId);
        updateJoystickFromPointer(e.clientX, e.clientY);
      };

      const onPointerMove = (e) => {
        if (activePointerId !== e.pointerId) return;
        e.preventDefault();
        updateJoystickFromPointer(e.clientX, e.clientY);
      };

      const onPointerUp = (e) => {
        if (activePointerId !== e.pointerId) return;
        e.preventDefault();
        activePointerId = null;
        resetJoystick();
      };

      joystick.addEventListener('pointerdown', onPointerDown);
      window.addEventListener('pointermove', onPointerMove);
      window.addEventListener('pointerup', onPointerUp);
      window.addEventListener('pointercancel', onPointerUp);
    }

    if (btnRestart) {
      const restart = (e) => {
        e.preventDefault();
        restartGame();
      };
      btnRestart.addEventListener('pointerdown', restart);
      btnRestart.addEventListener('touchstart', restart, { passive: false });
      btnRestart.addEventListener('mousedown', restart);
    }

    canvas.addEventListener('pointerdown', (e) => {
      if (!isUpgradeMenuOpen()) return;
      const rect = canvas.getBoundingClientRect();
      const scaleX = CANVAS_WIDTH / rect.width;
      const scaleY = CANVAS_HEIGHT / rect.height;
      const x = (e.clientX - rect.left) * scaleX;
      const y = (e.clientY - rect.top) * scaleY;
      const cards = getUpgradeCardRects();
      const index = cards.findIndex(card =>
        x >= card.x &&
        x <= card.x + card.width &&
        y >= card.y &&
        y <= card.y + card.height
      );
      if (index >= 0) {
        e.preventDefault();
        applyUpgradeChoice(index);
      }
    });

    window.addEventListener('blur', () => {
      keys['ArrowLeft'] = false;
      keys['ArrowRight'] = false;
      keys['ArrowUp'] = false;
      keys['Space'] = false;
      keys['KeyF'] = false;
      resetJoystick();
    });

    // Update game state
    function update(deltaMs) {
      const step = deltaMs / FRAME_MS;
      // Check input states
      const left = keys['ArrowLeft'] || keys['KeyA'] || (virtualMove.active && virtualMove.dx < -0.25);
      const right = keys['ArrowRight'] || keys['KeyD'] || (virtualMove.active && virtualMove.dx > 0.25);
      const up = keys['ArrowUp'] || keys['KeyW'] || (virtualMove.active && virtualMove.dy < -0.55);
      const attack = keys['Space'];
      const walk = keys['ShiftLeft'] || keys['ShiftRight'];
      const action = keys['KeyF'];

      if (levelState.phase === 'gameover') {
        updateParticles(step);
        return;
      }

      if (levelState.phase === 'won') {
        updateVictoryDance(deltaMs, step);
        return;
      }

      if (isUpgradeMenuOpen()) {
        updateParticles(step);
        if (state.pickupTextTimer > 0) {
          state.pickupTextTimer -= step;
        }
        if (state.levelFlashTimer > 0) {
          state.levelFlashTimer -= step;
        }
        if (state.alertTimer > 0) {
          state.alertTimer -= step;
        }
        return;
      }

      if (state.attackBoostTimer > 0) {
        state.attackBoostTimer -= step;
        if (state.attackBoostTimer <= 0) {
          state.tempAttackBonus = 0;
          syncAttackPower();
        }
      }

      if (state.speedBoostTimer > 0) {
        state.speedBoostTimer -= step;
      }

      if (state.pickupTextTimer > 0) {
        state.pickupTextTimer -= step;
      }

      if (state.levelFlashTimer > 0) {
        state.levelFlashTimer -= step;
      }

      if (state.alertTimer > 0) {
        state.alertTimer -= step;
      }

      // Handle dance
      if (action && !state.isAttacking && !state.isDancing && state.isGrounded) {
        state.isDancing = true;
        state.currentAnim = 'dance';
        state.frameIndex = 0;
        state.frameTimer = 0;
        state.danceInvulnTimer = DANCE_INVULN_MS;
      }

      // Handle attack
      if (attack && !state.isAttacking && !state.isDancing && state.isGrounded) {
        state.isAttacking = true;
        state.attackTimer = 0;
        state.currentAnim = 'attack';
        state.frameIndex = 0;
        state.hasAttackHit = false;
      }

      // Update attack animation
      if (state.isAttacking) {
        const anim = ANIMATIONS.attack;
        state.attackTimer += deltaMs;
        const frameDuration = 1000 / anim.fps;
        
        if (state.attackTimer >= frameDuration) {
          state.attackTimer -= frameDuration;
          state.frameIndex++;
          
          if (state.frameIndex >= anim.frames) {
            state.isAttacking = false;
            state.frameIndex = 0;
          }
        }
      }

      // Handle movement (only if not locked in an action)
      if (!state.isAttacking && !state.isDancing) {
        state.isWalking = walk;
        const speedMultiplier = state.speedBoostTimer > 0 ? 1.35 : 1;
        const speed = ((walk ? SPEED_WALK : SPEED_RUN) + state.levelSpeedBonus) * speedMultiplier;

        if (left && !right) {
          state.vx = -speed;
          state.facing = -1;
          if (state.currentAnim !== 'run') {
            state.currentAnim = 'run';
            state.frameIndex = 0;
            state.frameTimer = 0;
          }
        } else if (right && !left) {
          state.vx = speed;
          state.facing = 1;
          if (state.currentAnim !== 'run') {
            state.currentAnim = 'run';
            state.frameIndex = 0;
            state.frameTimer = 0;
          }
        } else {
          state.vx = 0;
          if (state.currentAnim !== 'idle') {
            state.currentAnim = 'idle';
            state.frameIndex = 0;
            state.frameTimer = 0;
          }
        }
      } else {
        state.vx = 0;
      }

      // Handle jumping
      if (up && state.isGrounded && !state.isAttacking && !state.isDancing) {
        state.vy = JUMP_FORCE;
        state.isGrounded = false;
      }

      // Apply gravity
      if (!state.isGrounded) {
        state.vy += GRAVITY * step;
      }

      // Update position
      const oldX = state.x;
      const oldY = state.y;
      state.x += state.vx * step;
      state.y += state.vy * step;

      // Ground / platform collision
      const platformTime = performance.now ? performance.now() : Date.now();
      const activePlatforms = getAllPlatforms(platformTime);
      const previousPlatforms = getAllPlatforms(platformTime - deltaMs);
      let landed = false;
      state.standingPlatformId = null;
      if (state.vy >= 0) {
        for (let i = 0; i < activePlatforms.length; i++) {
          const platform = activePlatforms[i];
          const platformTop = platform.y;
          const platformSupportY = platformTop + PLAYER_PLATFORM_OFFSET;
          const platformBaseX = platform.worldX != null ? platform.worldX : platform.x;
          const platformLeft = platformBaseX - SPRITE_DRAW_WIDTH * 0.22;
          const platformRight = platformBaseX + platform.width + SPRITE_DRAW_WIDTH * 0.22;
          if (
            state.x >= platformLeft &&
            state.x <= platformRight &&
            oldY <= platformSupportY &&
            state.y >= platformSupportY
          ) {
            state.y = platformSupportY;
            state.vy = 0;
            state.isGrounded = true;
            state.standingPlatformId = platform.id || null;
            if (platform.type === 'fragile') {
              state.fragilePlatforms[platform.id] = (state.fragilePlatforms[platform.id] || 0) + step;
            }
            landed = true;
            break;
          }
        }
      }

      if (!landed && state.y >= GROUND_Y) {
        state.y = GROUND_Y;
        state.vy = 0;
        state.isGrounded = true;
        state.standingPlatformId = null;
        landed = true;
      }

      if (!landed) {
        state.isGrounded = false;
        state.standingPlatformId = null;
      }

      if (landed && state.standingPlatformId) {
        const currentPlatform = activePlatforms.find(platform => platform.id === state.standingPlatformId);
        const previousPlatform = previousPlatforms.find(platform => platform.id === state.standingPlatformId);
        if (currentPlatform && previousPlatform && currentPlatform.type === 'moving') {
          state.x += currentPlatform.worldX - previousPlatform.worldX;
        }
      }

      Object.keys(state.fragilePlatforms).forEach((id) => {
        if (state.fragilePlatforms[id] > 0) {
          state.fragilePlatforms[id] += landed ? 0 : step * 1.8;
          if (state.fragilePlatforms[id] > 140) {
            delete state.fragilePlatforms[id];
          }
        }
      });

      const actualMove = state.x - oldX;
      updateCamera();
      ensureEasterContent();

      // Update parallax background scrolling based on INTENDED movement
      // Background moves in SAME direction as character
      bgLayers.forEach(layer => {
        if (layer.speed > 0) {
          layer.offset += actualMove * layer.speed;
        }
      });

      // Update monsters
      updateMonsters(step);
      updateEnemyProjectiles(step);

      // Update particles
      updateParticles(step);

      updatePowerups(step);

      if (state.hurtTimer > 0) {
        state.hurtTimer -= step;
      }

      if (state.invulnTimer > 0) {
        state.invulnTimer -= step;
      }

      if (state.danceInvulnTimer > 0) {
        state.danceInvulnTimer -= deltaMs;
        if (state.danceInvulnTimer < 0) {
          state.danceInvulnTimer = 0;
        }
      }

      if (levelState.bannerTimer > 0 && levelState.phase !== 'gameover') {
        levelState.bannerTimer -= step;
      }

      // Check attack hit during attack animation (active frames 3-8)
      if (state.isAttacking && state.frameIndex >= 3 && state.frameIndex <= 8) {
        // Only check once per attack
        if (!state.hasAttackHit) {
          checkAttackHit();
          state.hasAttackHit = true;
        }
      }

      // Update animation frame (for non-attack animations)
      if (!state.isAttacking) {
        const anim = ANIMATIONS[state.currentAnim];
        state.frameTimer += deltaMs;
        const frameDuration = 1000 / anim.fps;
        
        if (state.frameTimer >= frameDuration) {
          state.frameTimer -= frameDuration;
          state.frameIndex++;
          if (state.frameIndex >= anim.frames) {
            if (anim.loop) {
              state.frameIndex = 0;
            } else {
              state.frameIndex = 0;
              if (state.currentAnim === 'dance') {
                state.isDancing = false;
                state.danceInvulnTimer = 0;
                state.currentAnim = 'idle';
              }
            }
          }
        }
      }
    }

    // Parallax scrolling background layers with seamless looping
    // Load background images
    const bgImages = {
      sky: new Image(),
      cloud: new Image(),
      grass1: new Image(),
      grass2: new Image()
    };
    
    let bgImagesLoaded = 0;
    const totalBgImages = 4;
    
    function onBgImageLoad() {
      bgImagesLoaded++;
      if (bgImagesLoaded === totalBgImages) {
        console.log('背景图片加载完成');
      }
    }
    
    bgImages.sky.onload = onBgImageLoad;
    bgImages.cloud.onload = onBgImageLoad;
    bgImages.grass1.onload = onBgImageLoad;
    bgImages.grass2.onload = onBgImageLoad;
    
    // Set image sources
    bgImages.sky.src = '天空.png';
    bgImages.cloud.src = '白云.png';
    bgImages.grass1.src = '草地1.png';
    bgImages.grass2.src = '草地2.png';
    
    const bgLayers = [
      { // 1. Sky layer - static background
        speed: 0,
        offset: 0,
        draw: function(ctx, width, height) {
          if (bgImages.sky.complete && bgImages.sky.naturalWidth > 0) {
            const scaleX = width / bgImages.sky.naturalWidth;
            const scaleY = height / bgImages.sky.naturalHeight;
            const scale = Math.max(scaleX, scaleY);
            const drawWidth = bgImages.sky.naturalWidth * scale;
            const drawHeight = bgImages.sky.naturalHeight * scale;
            ctx.drawImage(bgImages.sky, (width - drawWidth) / 2, (height - drawHeight) / 2, drawWidth, drawHeight);
          }
        }
      },
      { // 2. Clouds layer - behind grass2, filling canvas
        speed: 0.1,
        offset: 0,
        draw: function(ctx, width, height) {
          if (bgImages.cloud.complete && bgImages.cloud.naturalWidth > 0) {
            const scale = Math.max(width / bgImages.cloud.naturalWidth, height / bgImages.cloud.naturalHeight) * 1.2;
            const cloudW = bgImages.cloud.naturalWidth * scale;
            const cloudH = bgImages.cloud.naturalHeight * scale;
            const offsetX = (this.offset * 0.5) % cloudW;
            const x = -offsetX - cloudW + (width - cloudW) / 2;
            const y = (height - cloudH) / 2;
            ctx.drawImage(bgImages.cloud, x, y, cloudW, cloudH);
            ctx.drawImage(bgImages.cloud, x + cloudW, y, cloudW, cloudH);
            ctx.drawImage(bgImages.cloud, x + cloudW * 2, y, cloudW, cloudH);
          }
        }
      },
      { // 3. Grass2 layer - distant grass (above grass1)
        speed: 0.4,
        offset: 0,
        draw: function(ctx, width, height) {
          if (bgImages.grass2.complete && bgImages.grass2.naturalWidth > 0) {
            const baseY = height - 55;
            const scale = 0.6;
            const grassW = bgImages.grass2.naturalWidth * scale;
            const grassH = bgImages.grass2.naturalHeight * scale;
            const spacing = grassW * 0.95;
            const numGrass = Math.ceil(width / spacing) + 3;
            const offsetX = this.offset % spacing;
            for (let i = -1; i < numGrass; i++) {
              const x = (i * spacing) - offsetX;
              const y = baseY - grassH + 20;
              ctx.drawImage(bgImages.grass2, x, y, grassW, grassH);
            }
          }
        }
      },
      { // 4. Grass1 layer - foreground grass (at very bottom)
        speed: 0.7,
        offset: 0,
        draw: function(ctx, width, height) {
          if (bgImages.grass1.complete && bgImages.grass1.naturalWidth > 0) {
            const baseY = height - 5;
            const scale = 1.067;
            const grassW = bgImages.grass1.naturalWidth * scale;
            const grassH = bgImages.grass1.naturalHeight * scale;
            const spacing = grassW * 0.98;
            const numGrass = Math.ceil(width / spacing) + 3;
            const offsetX = this.offset % spacing;
            for (let i = -1; i < numGrass; i++) {
              const x = (i * spacing) - offsetX;
              const y = baseY - grassH + 5;
              ctx.drawImage(bgImages.grass1, x, y, grassW, grassH);
            }
          }
          ctx.strokeStyle = '#475569';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(0, height - 10);
          ctx.lineTo(width, height - 10);
          ctx.stroke();
        }
      }
    ];

    // Render game
    function render() {
      // Clear canvas
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      // Draw parallax background layers
      bgLayers.forEach(layer => {
        ctx.save();
        layer.draw(ctx, CANVAS_WIDTH, CANVAS_HEIGHT);
        ctx.restore();
      });

      // Draw ground line
      ctx.strokeStyle = '#64748b';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, GROUND_Y + FRAME_HEIGHT / 2);
      ctx.lineTo(CANVAS_WIDTH, GROUND_Y + FRAME_HEIGHT / 2);
      ctx.stroke();

      drawStagePlatforms();
      drawRelicPlatforms();

      // Draw monsters (behind player)
      drawMonsters();
      drawEnemyProjectiles();

      // Draw particles (in front of monsters, behind player)
      drawParticles();

      drawPowerups();

      // Player HP
      ctx.fillStyle = 'rgba(15, 23, 42, 0.55)';
      ctx.fillRect(18, 18, 138, 12);
      ctx.fillStyle = '#334155';
      ctx.fillRect(22, 22, 130, 4);
      ctx.fillStyle = state.hp > 2 ? '#22c55e' : '#ef4444';
      ctx.fillRect(22, 22, 130 * (state.hp / state.maxHp), 4);

      ctx.font = '700 11px ui-monospace, SFMono-Regular, Menlo, monospace';
      ctx.fillStyle = state.attackBoostTimer > 0 ? '#facc15' : '#cbd5e1';
      ctx.fillText(`攻击 ${state.attackPower}`, 22, 34);
      if (state.speedBoostTimer > 0) {
        ctx.fillStyle = '#38bdf8';
        ctx.fillText('加速', 86, 34);
      }
      if (easterState.relicCollected) {
        ctx.fillStyle = '#fef08a';
        ctx.fillText('巨斧', 124, 34);
      }
      ctx.fillStyle = '#e2e8f0';
      ctx.fillText(`${Math.round(state.x / METER_TO_WORLD)}米`, 22, 48);
      ctx.fillText(`等级 ${state.level}`, 84, 48);
      ctx.fillStyle = '#334155';
      ctx.fillRect(18, 56, 138, 7);
      ctx.fillStyle = '#60a5fa';
      ctx.fillRect(18, 56, 138 * (state.exp / state.nextExp), 7);
      ctx.fillStyle = '#dbeafe';
      ctx.fillText(`经验 ${state.exp}/${state.nextExp}`, 22, 66);

      if (state.alertTimer > 0) {
        ctx.save();
        ctx.globalAlpha = Math.min(1, state.alertTimer / 18);
        ctx.textAlign = 'center';
        const alertPadding = 18;
        const maxAlertWidth = Math.min(360, CANVAS_WIDTH - 40);
        let alertFontSize = 12;
        ctx.font = `700 ${alertFontSize}px ui-monospace, SFMono-Regular, Menlo, monospace`;
        const maxTextWidth = maxAlertWidth - alertPadding * 2;
        const lines = [];
        let currentLine = '';
        for (const ch of state.alertText) {
          const candidate = currentLine + ch;
          if (ctx.measureText(candidate).width > maxTextWidth && currentLine) {
            lines.push(currentLine);
            currentLine = ch;
          } else {
            currentLine = candidate;
          }
        }
        if (currentLine) lines.push(currentLine);

        if (lines.length > 2) {
          alertFontSize = 10;
          ctx.font = `700 ${alertFontSize}px ui-monospace, SFMono-Regular, Menlo, monospace`;
          lines.length = 0;
          currentLine = '';
          for (const ch of state.alertText) {
            const candidate = currentLine + ch;
            if (ctx.measureText(candidate).width > maxTextWidth && currentLine) {
              lines.push(currentLine);
              currentLine = ch;
            } else {
              currentLine = candidate;
            }
          }
          if (currentLine) lines.push(currentLine);
        }

        const visibleLines = lines.slice(0, 2);
        const textWidth = Math.max(...visibleLines.map(line => ctx.measureText(line).width), 0);
        const alertWidth = Math.min(maxAlertWidth, Math.max(190, textWidth + alertPadding * 2));
        const lineHeight = alertFontSize + 2;
        const alertHeight = 16 + visibleLines.length * lineHeight;
        const alertX = CANVAS_WIDTH / 2 - alertWidth / 2;
        ctx.fillStyle = 'rgba(15, 23, 42, 0.78)';
        ctx.fillRect(alertX, 30, alertWidth, alertHeight);
        ctx.strokeStyle = state.alertColor;
        ctx.strokeRect(alertX, 30, alertWidth, alertHeight);
        ctx.fillStyle = state.alertColor;
        visibleLines.forEach((line, index) => {
          ctx.fillText(line, CANVAS_WIDTH / 2, 36 + index * lineHeight);
        });
        ctx.restore();
      }

      drawLevelHud();

      // Get current animation and frame
      const frames = spriteFrames[state.currentAnim];
      const frame = frames && frames[state.frameIndex];
      
      if (frame) {
        // Draw sprite with flipping based on facing direction
        ctx.save();
        if (state.invulnTimer > 0 && Math.floor(state.invulnTimer / 5) % 2 === 0) {
          ctx.globalAlpha = 0.58;
        }
        
        const playerScreenX = worldToScreenX(state.x);
        const drawX = playerScreenX - SPRITE_DRAW_WIDTH / 2;
        const drawY = state.y - SPRITE_DRAW_HEIGHT;
        
        if (state.facing === -1) {
          ctx.translate(drawX + SPRITE_DRAW_WIDTH, drawY);
          ctx.scale(-1, 1);
          ctx.drawImage(frame, 0, 0);
        } else {
          ctx.drawImage(frame, drawX, drawY);
        }

        ctx.restore();

        if (state.hurtTimer > 0) {
          ctx.save();
          ctx.globalAlpha = 0.35;
          ctx.fillStyle = '#facc15';
          ctx.fillRect(drawX + 28, drawY + 18, SPRITE_DRAW_WIDTH - 56, SPRITE_DRAW_HEIGHT - 24);
          ctx.restore();
        }

        if (state.levelFlashTimer > 0) {
          ctx.save();
          ctx.globalAlpha = Math.min(0.65, state.levelFlashTimer / 70);
          ctx.strokeStyle = '#93c5fd';
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.arc(playerScreenX, drawY + SPRITE_DRAW_HEIGHT * 0.52, 34 + (60 - state.levelFlashTimer) * 0.7, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }
      }

      if (state.pickupTextTimer > 0) {
        ctx.save();
        ctx.globalAlpha = Math.min(1, state.pickupTextTimer / 20);
        ctx.textAlign = 'center';
        ctx.font = '800 14px ui-monospace, SFMono-Regular, Menlo, monospace';
        ctx.fillStyle = '#fef9c3';
        ctx.fillText(state.pickupText, worldToScreenX(state.x), state.y - SPRITE_DRAW_HEIGHT - 18);
        ctx.restore();
      }

      drawUpgradeMenu();

      // Debug info (optional)
      // ctx.fillStyle = '#fff';
      // ctx.font = '14px monospace';
      // ctx.fillText(`Anim: ${state.currentAnim} Frame: ${state.frameIndex}`, 10, 20);
    }

    // Game loop
    let lastFrameTime = 0;
    function gameLoop(timestamp) {
      if (!lastFrameTime) {
        lastFrameTime = timestamp;
      }
      const deltaMs = Math.min(timestamp - lastFrameTime, MAX_DELTA_MS);
      lastFrameTime = timestamp;

      update(deltaMs);
      render();
      requestAnimationFrame(gameLoop);
    }
  </script>
</body>
</html>
